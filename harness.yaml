# Portfolio Harness — 6 Sprints, Resumable

project:
  name: "nikhil-portfolio"
  prompt: "Build a developer portfolio website for Nikhil Tiwari — a Full Stack Developer & AI Engineer with 6+ years experience."

planner:
  sprints: 6
  source: "profile.md"

generator:
  stack: ["next.js", "tailwind", "typescript", "framer-motion"]
  version_control: true

evaluator:
  max_retries: 3
  baselines:
    - "https://www.adhamdannaway.com"
    - "https://brittanychiang.com"
    - "https://stefanvitasovic.com"
    - "https://joffreyspitzer.com"
  criteria:
    - name: design_quality
      weight: 0.30
      threshold: 7
    - name: animations
      weight: 0.25
      threshold: 7
    - name: functionality
      weight: 0.25
      threshold: 7
    - name: code_quality
      weight: 0.20
      threshold: 7
